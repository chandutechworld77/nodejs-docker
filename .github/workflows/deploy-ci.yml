name: faang-devsecops-pipeline

on:
  push:
    branches:
      - master
      
  workflow_dispatch:

env:
  APP_PORT: 8080
  ALLOWED_BRANCHES: "main dev"

jobs:

  guard:

    runs-on: ubuntu-latest

    steps:

      - name: Detect branch
        run: |
          BRANCH=${GITHUB_REF##*/}
          echo "Current branch: $BRANCH"

          if [[ ! "${ALLOWED_BRANCHES}" =~ "${BRANCH}" ]]; then
            echo "Unauthorized branch execution detected"
            exit 1
          fi

  formatting:

    runs-on: ubuntu-latest
    needs: guard

    steps:

      - uses: actions/checkout@v4

      - name: Fix YAML indentation
        run: |
          npm install -g prettier
          prettier --write "**/*.yml"

  security_scan:

    runs-on: ubuntu-latest
    needs: formatting

    steps:

      - uses: actions/checkout@v4

      - name: Dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH

  build:

    runs-on: ubuntu-latest
    needs: security_scan

    steps:

      - uses: actions/checkout@v4

      - name: Build container
        run: |
          docker build -t app-test .

      - name: Run container locally
        run: |
          docker run -d -p 8080:8080 app-test
          sleep 10

      - name: Health test
        run: |
          curl -f http://localhost:8080 || exit 1

  container_scan:

    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Scan container
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-test

  cost_analysis:

    runs-on: ubuntu-latest
    needs: container_scan

    steps:

      - name: Estimate deployment cost
        run: |
          echo "Analyzing deployment cost..."
          echo "Suggested replica reduction if load <50%"

  prediction:

    runs-on: ubuntu-latest
    needs: cost_analysis

    steps:

         - name: Predict deployment success
        run: |
             echo "Prediction: deployment likely to succeed"

  deploy:

    runs-on: ubuntu-latest
    needs: prediction

    steps:

      - name: Deploy container
        run: |
          echo "Deploying application"

  cleanup:

    runs-on: ubuntu-latest
    needs: deploy

    steps:

      - name: Cleanup docker images
        run: |
          docker system prune -af
