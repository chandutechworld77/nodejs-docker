#!/bin/bash

set -e

# =========================
# VARIABLES (EDIT THESE)
# =========================
RG="<RESOURCE_GROUP>"
LOCATION="centralindia"

ACR_NAME="<ACR_NAME>"
ACR_REPO="nodejs-docker"

APP_NAME="nodejs-docker"
CAE_ENV="<CONTAINER_APP_ENV>"

IMAGE_TAG=$(git rev-parse --short HEAD)
IMAGE=""

echo "Using IMAGE TAG: $IMAGE_TAG"

# =========================
# LOGIN CHECK
# =========================
az account show > /dev/null || az login

# =========================
# GET ACR LOGIN SERVER
# =========================
LOGIN_SERVER=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
IMAGE="$LOGIN_SERVER/$ACR_REPO:$IMAGE_TAG"

echo "IMAGE = $IMAGE"

# =========================
# CREATE CONTAINER APP ENV (if not exists)
# =========================
echo "Checking Container App Environment..."

az containerapp env show \
  --name $CAE_ENV \
  --resource-group $RG >/dev/null 2>&1 || \
az containerapp env create \
  --name $CAE_ENV \
  --resource-group $RG \
  --location $LOCATION

# =========================
# CREATE CONTAINER APP (if not exists)
# =========================
echo "Checking Container App..."

APP_EXISTS=$(az containerapp show \
  --name $APP_NAME \
  --resource-group $RG \
  --query name -o tsv 2>/dev/null || echo "")

if [ -z "$APP_EXISTS" ]; then
  echo "Creating Container App..."

  az containerapp create \
    --name $APP_NAME \
    --resource-group $RG \
    --environment $CAE_ENV \
    --image mcr.microsoft.com/azuredocs/containerapps-helloworld:latest \
    --target-port 3000 \
    --ingress external \
    --min-replicas 1 \
    --max-replicas 2 \
    --system-assigned
else
  echo "Container App already exists"
fi

# =========================
# GET MANAGED IDENTITY
# =========================
PRINCIPAL_ID=$(az containerapp show \
  --name $APP_NAME \
  --resource-group $RG \
  --query identity.principalId -o tsv)

echo "PRINCIPAL_ID = $PRINCIPAL_ID"

# =========================
# ASSIGN ACR ROLE
# =========================
echo "Assigning AcrPull role..."

ACR_ID=$(az acr show --name $ACR_NAME --query id -o tsv)

az role assignment create \
  --assignee $PRINCIPAL_ID \
  --role AcrPull \
  --scope $ACR_ID 2>/dev/null || echo "Role already exists"

# =========================
# WAIT FOR RBAC
# =========================
echo "Waiting for RBAC propagation..."
sleep 120

# =========================
# CONFIGURE REGISTRY
# =========================
echo "Configuring Container App registry..."

az containerapp registry set \
  --name $APP_NAME \
  --resource-group $RG \
  --server $LOGIN_SERVER \
  --identity system

# =========================
# BUILD & PUSH IMAGE
# =========================
echo "Building & pushing image..."

az acr login --name $ACR_NAME

docker build -t $IMAGE .
docker push $IMAGE

# =========================
# DEPLOY IMAGE
# =========================
echo "Deploying image..."

az containerapp update \
  --name $APP_NAME \
  --resource-group $RG \
  --image $IMAGE

# =========================
# SHOW STATUS
# =========================
echo "Deployment Status:"

az containerapp show \
  --name $APP_NAME \
  --resource-group $RG \
  --query "{state:properties.provisioningState,fqdn:properties.configuration.ingress.fqdn}" \
  -o table
