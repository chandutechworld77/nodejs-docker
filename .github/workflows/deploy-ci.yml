name: 🚀 Secure Deploy to AWS ECS (ECR + ECS)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  id-token: write
  contents: write
  security-events: write

env:
  AWS_REGION:      ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:  ${{ secrets.ECR_REPOSITORY }}
  ECS_SERVICE:     ${{ secrets.ECS_SERVICE }}
  ECS_CLUSTER:     ${{ secrets.ECS_CLUSTER }}
  CONTAINER_NAME:  ${{ secrets.CONTAINER_NAME }}
  TASK_DEFINITION: ${{ secrets.TASK_DEFINITION }}

jobs:

# ═══════════════════════════════════════════════
# 0. 🧹 Clean Workspace (START)
# ═══════════════════════════════════════════════
  clean-start:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner workspace
        run: |
          echo "Cleaning workspace before pipeline..."
          sudo rm -rf $GITHUB_WORKSPACE/*
          docker system prune -af || true
          docker builder prune -af || true
          echo "✅ Clean start completed"

# ═══════════════════════════════════════════════
# 1. 🔐 Credential Scan
# ═══════════════════════════════════════════════
  credential-scan:
    runs-on: ubuntu-latest
    needs: clean-start
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2

      - name: TruffleHog Scan (Docker)
  run: |
    echo "Running TruffleHog scan..."
    docker run --rm -v ${{ github.workspace }}:/repo \
      ghcr.io/trufflesecurity/trufflehog:latest \
      filesystem /repo --only-verified --no-update

# ═══════════════════════════════════════════════
# 2. ✏️ Format + Spell Check
# ═══════════════════════════════════════════════
  format:
    runs-on: ubuntu-latest
    needs: credential-scan
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          npm install -g prettier cspell
          npx prettier --write .
          npx cspell "**/*.{js,ts,md,yml}" || true

# ═══════════════════════════════════════════════
# 3. 🦠 Virus Scan
# ═══════════════════════════════════════════════
  virus-scan:
    runs-on: ubuntu-latest
    needs: credential-scan
    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y clamav
          sudo freshclam
          clamscan -r . --exclude-dir=".git" || exit 1

# ═══════════════════════════════════════════════
# 4. 🐳 Build Docker Image
# ═══════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: [format, virus-scan]
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login
        uses: aws-actions/amazon-ecr-login@v2

      - id: meta
        run: |
          TAG=${GITHUB_SHA::8}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - run: |
          docker build -t ${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }} .

      - run: |
          docker save -o image.tar ${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}

      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar

# ═══════════════════════════════════════════════
# 5. 🔍 Trivy Scan
# ═══════════════════════════════════════════════
  trivy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: image

      - uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

      - uses: aquasecurity/trivy-action@0.20.0
        with:
          input: image.tar
          severity: CRITICAL,HIGH
          exit-code: 1

# ═══════════════════════════════════════════════
# 6. 📦 Push to ECR
# ═══════════════════════════════════════════════
  push:
    runs-on: ubuntu-latest
    needs: trivy
    outputs:
      image: ${{ steps.push.outputs.image }}

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/download-artifact@v4
        with:
          name: image

      - id: push
        run: |
          docker load -i image.tar
          IMAGE=${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build.outputs.image-tag }}
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

# ═══════════════════════════════════════════════
# 7. 🚢 Deploy to ECS
# ═══════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --query taskDefinition > task.json

      - run: |
          sed -i "s|image.*|image\\\": \\\"${{ needs.push.outputs.image }}\\\"|g" task.json

      - run: |
          aws ecs register-task-definition --cli-input-json file://task.json
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

# ═══════════════════════════════════════════════
# 8. 🧹 Cleanup (END)
# ═══════════════════════════════════════════════
  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy, trivy, virus-scan]
    steps:
      - run: |
          echo "Final cleanup..."
          docker system prune -af || true
          rm -f image.tar || true
          echo "✅ Cleanup done"
