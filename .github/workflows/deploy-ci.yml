name: Self-Healing CI/CD + ACA Deploy (OIDC)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: aca-master-${{ github.repository }}
  cancel-in-progress: true

env:
  IMAGE_NAME: app

jobs:

# ============================
# CLEAN + CHECKOUT
# ============================
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Clean workspace
        run: |
          echo "Cleaning workspace..."
          rm -rf * .[^.]* || true

      - name: Checkout code
        uses: actions/checkout@v4


# ============================
# LINT + VALIDATION
# ============================
  lint-validate:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -type f -name "*.sh" -exec shellcheck {} \; || true

      - name: Validate Dependencies
        run: echo "Validating dependencies..."


# ============================
# RUN SCRIPTS WITH RETRY
# ============================
  run-scripts:
    runs-on: ubuntu-latest
    needs: lint-validate

    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Run Scripts with Retry
        run: |
          for script in $(find . -name "*.sh"); do
            echo "Running $script"
            for i in 1 2 3; do
              bash "$script" && break
              echo "Retry $i for $script"
              sleep 5
            done
          done


# ============================
# RECOVERY
# ============================
  recovery:
    runs-on: ubuntu-latest
    needs: run-scripts
    if: always()

    steps:
      - name: Recovery step
        run: echo "Recovery completed"


# ============================
# BUILD + PUSH TO ACR
# ============================
  build:
    runs-on: ubuntu-latest
    needs: recovery
    environment: master

    outputs:
      IMAGE: ${{ steps.image.outputs.IMAGE }}
      LOGIN_SERVER: ${{ steps.acr.outputs.LOGIN_SERVER }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate image tag
        id: meta
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Get ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr show \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.ACR_NAME }}" \
            --query loginServer -o tsv)
          echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Define image
        id: image
        run: |
          echo "IMAGE=${{ steps.acr.outputs.LOGIN_SERVER }}/${{ vars.ACR_REPO }}:${{ steps.meta.outputs.TAG }}" >> $GITHUB_OUTPUT

      - name: ACR Login
        run: az acr login -n "${{ vars.ACR_NAME }}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.image.outputs.IMAGE }}

      - name: Push image
        run: docker push "${{ steps.image.outputs.IMAGE }}"


# ============================
# DEPLOY TO AZURE CONTAINER APPS
# ============================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: master

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Ensure app exists
      - name: Ensure Container App exists
        run: |
          EXISTS=$(az containerapp show \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.APP_NAME }}" \
            --query "name" -o tsv 2>/dev/null || echo "notfound")

          if [ "$EXISTS" = "${{ vars.APP_NAME }}" ]; then
            echo "Container App exists ✅"
          else
            echo "Creating Container App..."
            az containerapp create \
              -g "${{ vars.RG_ENV }}" \
              -n "${{ vars.APP_NAME }}" \
              --environment "${{ vars.CAE_ENV }}" \
              --image mcr.microsoft.com/azuredocs/containerapps-helloworld:latest \
              --ingress "${{ vars.INGRESS_TYPE }}" \
              --target-port "${{ vars.APP_PORT }}" \
              --system-assigned \
              --min-replicas 1 \
              --max-replicas 2 \
              --no-wait
          fi

      # Wait for provisioning
      - name: Wait for Container App
        run: |
          echo "Waiting for Container App..."
          for i in {1..30}; do
            STATE=$(az containerapp show \
              -g "${{ vars.RG_ENV }}" \
              -n "${{ vars.APP_NAME }}" \
              --query "properties.provisioningState" -o tsv 2>/dev/null)

            echo "State: $STATE"

            if [ "$STATE" = "Succeeded" ]; then
              echo "Ready ✅"
              break
            fi

            sleep 10
          done

      # Assign AcrPull role
      - name: Ensure AcrPull role
        run: |
          PRINCIPAL_ID=$(az containerapp show \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.APP_NAME }}" \
            --query identity.principalId -o tsv)

          ACR_ID=$(az acr show \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.ACR_NAME }}" \
            --query id -o tsv)

          az role assignment create \
            --assignee "$PRINCIPAL_ID" \
            --role AcrPull \
            --scope "$ACR_ID" || true

      # Deploy image
      - name: Deploy image
        run: |
          az containerapp update \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.APP_NAME }}" \
            --image "${{ needs.build.outputs.IMAGE }}"

      # Show status
      - name: Show status
        run: |
          az containerapp show \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.APP_NAME }}" \
            --query "{state:properties.provisioningState,fqdn:properties.configuration.ingress.fqdn}" \
            -o table
