name: dev-deploy (ACA)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: aca-master-${{ github.repository }}
  cancel-in-progress: true

jobs:
  # ============================
  # BUILD + PUSH
  # ============================
  build:
    runs-on: ubuntu-latest
    environment: master   # ✅ IMPORTANT

    outputs:
      IMAGE: ${{ steps.img.outputs.IMAGE }}
      LOGIN_SERVER: ${{ steps.acr.outputs.LOGIN_SERVER }}

    steps:
      # ----------------------------
      # Debug secrets (VERY IMPORTANT)
      # ----------------------------
      - name: Debug secrets
        run: |
          echo "CLIENT_ID exists? ${{ secrets.AZURE_CLIENT_ID != '' }}"
          echo "TENANT_ID exists? ${{ secrets.AZURE_TENANT_ID != '' }}"
          echo "SUB_ID exists? ${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}"

      # ----------------------------
      # Clean workspace
      # ----------------------------
      - name: Clean workspace
        run: |
          echo "Cleaning workspace..."
          rm -rf * .[^.]* || true

      # ----------------------------
      # Checkout
      # ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Azure Login (OIDC)
      # ----------------------------
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ----------------------------
      # Image metadata
      # ----------------------------
      - name: Compute image tag
        id: meta
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Get ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr show \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.ACR_NAME }}" \
            --query loginServer -o tsv)
          echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Define image
        id: img
        run: |
          echo "IMAGE=${{ steps.acr.outputs.LOGIN_SERVER }}/${{ vars.ACR_REPO }}:${{ steps.meta.outputs.TAG }}" >> $GITHUB_OUTPUT

      # ----------------------------
      # ACR Login
      # ----------------------------
      - name: ACR Login
        run: az acr login -n "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------
      # Build image
      # ----------------------------
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ steps.img.outputs.IMAGE }}

      # ----------------------------
      # Push image
      # ----------------------------
      - name: Push image to ACR
        run: docker push "${{ steps.img.outputs.IMAGE }}"

  # ============================
  # DEPLOY
  # ============================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: master   # ✅ IMPORTANT

    steps:
      # ----------------------------
      # Azure Login
      # ----------------------------
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ----------------------------
      # Ensure Container App exists
      # ----------------------------
      - name: Ensure Container App exists
        run: |
          if az containerapp show -g "${{ vars.RG_ENV }}" -n "${{ vars.APP_NAME }}" >/dev/null 2>&1; then
            echo "Container App exists"
          else
            az containerapp create \
              -g "${{ vars.RG_ENV }}" \
              -n "${{ vars.APP_NAME }}" \
              --environment "${{ vars.CAE_ENV }}" \
              --image mcr.microsoft.com/azuredocs/containerapps-helloworld:latest \
              --ingress "${{ vars.INGRESS_TYPE }}" \
              --target-port "${{ vars.APP_PORT }}" \
              --min-replicas 1 \
              --max-replicas 2 \
              --system-assigned
          fi

      # ----------------------------
      # Ensure AcrPull role
      # ----------------------------
      - name: Ensure AcrPull role
        run: |
          PRINCIPAL_ID=$(az containerapp show \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.APP_NAME }}" \
            --query identity.principalId -o tsv)

          ACR_ID=$(az acr show \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.ACR_NAME }}" \
            --query id -o tsv)

          COUNT=$(az role assignment list \
            --assignee "$PRINCIPAL_ID" \
            --scope "$ACR_ID" \
            --role AcrPull \
            --query "length(@)" -o tsv)

          if [ "$COUNT" -eq 0 ]; then
            az role assignment create \
              --assignee "$PRINCIPAL_ID" \
              --role AcrPull \
              --scope "$ACR_ID"
          fi

      # ----------------------------
      # Configure ACR
      # ----------------------------
      - name: Configure ACR
        run: |
          az containerapp registry set \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.APP_NAME }}" \
            --server "${{ needs.build.outputs.LOGIN_SERVER }}" \
            --identity system

      # ----------------------------
      # Deploy image
      # ----------------------------
      - name: Deploy image
        run: |
          az containerapp update \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.APP_NAME }}" \
            --image "${{ needs.build.outputs.IMAGE }}"

      # ----------------------------
      # Status
      # ----------------------------
      - name: Show status
        run: |
          az containerapp show \
            -g "${{ vars.RG_ENV }}" \
            -n "${{ vars.APP_NAME }}" \
            --query "{state:properties.provisioningState,fqdn:properties.configuration.ingress.fqdn}" \
            -o table
