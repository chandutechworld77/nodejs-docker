name: Advanced DevSecOps Pipeline

on:
  push:
    branches:
      - master
      - main
      - dev
  workflow_dispatch:

env:
  APP_PORT: 8080
  ALLOWED_BRANCHES: "master main dev"

jobs:

# ------------------------------
# WORKSPACE CLEANUP
# ------------------------------
  clean_workspace:
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.start.outputs.time }}

    steps:
      - name: Record pipeline start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean runner environment
        run: |
          docker system prune -af || true
          rm -rf *

# ------------------------------
# BRANCH GUARD
# ------------------------------
  branch_guard:
    runs-on: ubuntu-latest
    needs: clean_workspace

    steps:
      - name: Validate branch
        run: |
          BRANCH=${GITHUB_REF_NAME}
          echo "Running on branch: $BRANCH"

          if [[ ! " $ALLOWED_BRANCHES " =~ " $BRANCH " ]]; then
            echo "Unauthorized branch detected"
            exit 1
          fi

# ------------------------------
# CHECKOUT + FORMAT FIX
# ------------------------------
  formatting:
    runs-on: ubuntu-latest
    needs: branch_guard

    steps:
      - uses: actions/checkout@v4

      - name: Fix YAML indentation automatically
        run: |
          npm install -g prettier
          prettier --write "**/*.yml" || true

# ------------------------------
# DEPENDENCY SECURITY SCAN
# ------------------------------
  dependency_scan:
    runs-on: ubuntu-latest
    needs: formatting

    steps:
      - uses: actions/checkout@v4

      - name: Scan dependencies for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH

# ------------------------------
# MALWARE / VIRUS SCAN
# ------------------------------
  malware_scan:
    runs-on: ubuntu-latest
    needs: dependency_scan

    steps:
      - uses: actions/checkout@v4

      - name: Install antivirus
        run: |
          sudo apt-get update
          sudo apt-get install clamav -y

      - name: Run malware scan
        run: |
          clamscan -r .

# ------------------------------
# BUILD DOCKER IMAGE
# ------------------------------
  build:
    runs-on: ubuntu-latest
    needs: malware_scan

    steps:
      - uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -t devsecops-app .

# ------------------------------
# RUN CONTAINER LOCALLY
# ------------------------------
  local_test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Run container
        run: |
          docker run -d -p 8080:8080 --name app-test devsecops-app

      - name: Wait for app start
        run: sleep 15

      - name: Show container logs
        run: docker logs app-test || true

      - name: Health check
        run: |
          for i in {1..10}; do
            curl -f http://localhost:8080 && break
            echo "Waiting for application..."
            sleep 5
          done

      - name: Stop container
        run: |
          docker stop app-test
          docker rm app-test

# ------------------------------
# CONTAINER SECURITY SCAN
# ------------------------------
  container_scan:
    runs-on: ubuntu-latest
    needs: local_test

    steps:
      - name: Scan container vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-app
          severity: CRITICAL,HIGH

# ------------------------------
# COST ANALYSIS
# ------------------------------
  cost_analysis:
    runs-on: ubuntu-latest
    needs: container_scan

    steps:
      - name: Cost optimization suggestions
        run: |
          echo "Analyzing infrastructure cost..."
          echo "Suggestions:"
          echo "- Enable autoscaling"
          echo "- Reduce replicas when CPU <50%"
          echo "- Use spot instances for non-production workloads"

# ------------------------------
# PIPELINE PREDICTION
# ------------------------------
  prediction:
    runs-on: ubuntu-latest
    needs: cost_analysis

    steps:
      - name: Predict pipeline success
        run: |
          echo "Analyzing pipeline stages..."
          echo "Prediction: Deployment likely successful"

# ------------------------------
# MANUAL APPROVAL
# ------------------------------
  approval:
    runs-on: ubuntu-latest
    needs: prediction
    environment:
      name: production

    steps:
      - name: Await manual approval
        run: echo "Waiting for reviewer approval before deployment"

# ------------------------------
# DEPLOY
# ------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Deploy application
        run: |
          echo "Deployment started"

# ------------------------------
# PIPELINE RUNTIME ESTIMATION
# ------------------------------
  pipeline_metrics:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Calculate pipeline runtime
        run: |
          START=${{ needs.clean_workspace.outputs.start_time }}
          END=$(date +%s)
          DURATION=$((END - START))
          echo "Pipeline runtime: $DURATION seconds"

# ------------------------------
# FINAL CLEANUP
# ------------------------------
  cleanup:
    runs-on: ubuntu-latest
    needs: pipeline_metrics

    steps:
      - name: Clean runner resources
        run: |
          docker system prune -af || true
