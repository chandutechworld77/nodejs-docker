name: 🚀 Secure Deploy to AWS ECS

on:
  push:
    branches: [ master ]

permissions:
  id-token: write
  contents: write
  security-events: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  TASK_DEFINITION: ${{ secrets.TASK_DEFINITION }}

jobs:

# 🧹 CLEAN START
  clean-start:
    runs-on: ubuntu-latest
    steps:
      - name: Clean workspace
        run: |
          sudo rm -rf $GITHUB_WORKSPACE/*
          docker system prune -af || true

# 🔐 CREDENTIAL SCAN
  credential-scan:
    runs-on: ubuntu-latest
    needs: clean-start

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2

      - name: TruffleHog Scan
        run: |
          echo "Running TruffleHog..."
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --only-verified \
            --no-update

# ✏️ FORMAT
  format:
    runs-on: ubuntu-latest
    needs: credential-scan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Format Code
        run: |
          npm install -g prettier
          npx prettier --write .

# 🦠 VIRUS SCAN
  virus-scan:
    runs-on: ubuntu-latest
    needs: credential-scan

    steps:
      - uses: actions/checkout@v4

      - name: Run ClamAV
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clamav
          sudo freshclam
          clamscan -r . --exclude-dir=".git" || exit 1

# 🐳 BUILD
  build:
    runs-on: ubuntu-latest
    needs: [format, virus-scan]
    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login
        uses: aws-actions/amazon-ecr-login@v2

      - id: meta
        run: |
          TAG=${GITHUB_SHA::8}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Image
        run: |
          docker build -t ${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }} .

      - name: Save Image
        run: |
          docker save -o image.tar ${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}

      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar

# 🔍 TRIVY
  trivy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image

      - name: Scan Image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          input: image.tar
          severity: CRITICAL,HIGH
          exit-code: 1

# 📦 PUSH
  push:
    runs-on: ubuntu-latest
    needs: trivy
    outputs:
      image: ${{ steps.push.outputs.image }}

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/download-artifact@v4
        with:
          name: image

      - id: push
        run: |
          docker load -i image.tar
          IMAGE=${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build.outputs.tag }}
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

# 🚢 DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

# 🧹 CLEAN END
  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy, trivy, virus-scan]

    steps:
      - name: Cleanup
        run: |
          docker system prune -af || true
          rm -f image.tar || true
