name: Production Deploy (ACA)

on:
  push:
    branches: ["main", "production"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  id-token: write
  contents: read
  security-events: write

concurrency:
  group: aca-prod-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_NAME: ${{ vars.ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.RG_ENV }}
  CONTAINER_APP_NAME: ${{ vars.APP_NAME }}
  CONTAINER_APP_ENV: ${{ vars.CAE_ENV }}
  ACR_REPO: ${{ vars.ACR_REPO }}
  MIN_REPLICAS: 2
  MAX_REPLICAS: 5
  HEALTH_CHECK_TIMEOUT: 300
  HEALTH_CHECK_RETRIES: 10

jobs:

  # ========== STAGE 1: SECURE BUILD & SECURITY SCANNING ==========
  build:
    name: 🏗️ Build, Scan & Secure
    runs-on: ubuntu-latest
    environment: production
    
    outputs:
      IMAGE: ${{ steps.img.outputs.IMAGE }}
      LOGIN_SERVER: ${{ steps.acr.outputs.LOGIN_SERVER }}
      IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
      SBOM_HASH: ${{ steps.sbom.outputs.sbom_hash }}
      SCAN_STATUS: ${{ steps.security.outputs.scan_status }}
      BUILD_TIMESTAMP: ${{ steps.meta.outputs.BUILD_TIMESTAMP }}

    steps:

      # -------- Workspace Setup --------
      - name: Clean workspace
        run: |
          echo "🧹 Cleaning workspace..."
          rm -rf * .[^.]* || true
          df -h

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      # -------- Azure Authentication --------
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        env:
          AZURE_ALLOW_MANAGED_IDENTITY_CUSTOM_ASSIGNMENT: true

      # -------- Image Tagging & Metadata --------
      - name: Generate image metadata
        id: meta
        run: |
          echo "BUILD_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "GIT_BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GITHUB_SHA" >> $GITHUB_OUTPUT

      - name: Get ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr show \
            -g "${{ env.RESOURCE_GROUP }}" \
            -n "${{ env.REGISTRY_NAME }}" \
            --query loginServer -o tsv)

          if [ -z "$LOGIN_SERVER" ]; then
            echo "❌ Failed to get ACR login server"
            exit 1
          fi

          echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_OUTPUT
          echo "✅ ACR Login Server: $LOGIN_SERVER"

      - name: Define image reference
        id: img
        run: |
          IMAGE="${{ steps.acr.outputs.LOGIN_SERVER }}/${{ env.ACR_REPO }}:${{ steps.meta.outputs.IMAGE_TAG }}"
          IMAGE_LATEST="${{ steps.acr.outputs.LOGIN_SERVER }}/${{ env.ACR_REPO }}:latest"
          
          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
          echo "IMAGE_LATEST=$IMAGE_LATEST" >> $GITHUB_OUTPUT
          echo "📦 Image: $IMAGE"

      - name: ACR login
        run: |
          echo "🔐 Logging into ACR..."
          az acr login -n "${{ env.REGISTRY_NAME }}"

      # -------- Docker Build --------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          buildkitd-flags: --allow-insecure-entitlement security.insecure

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.img.outputs.IMAGE }}
            ${{ steps.img.outputs.IMAGE_LATEST }}
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod
          outputs: type=docker
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.BUILD_TIMESTAMP }}
            VCS_REF=${{ steps.meta.outputs.GIT_COMMIT }}
            VERSION=${{ steps.meta.outputs.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.BUILD_TIMESTAMP }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.GIT_COMMIT }}
            org.opencontainers.image.version=${{ steps.meta.outputs.IMAGE_TAG }}
            org.opencontainers.image.source=${{ github.repository }}

      # -------- Security Scanning --------
      - name: Run Trivy vulnerability scan
        id: trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ steps.img.outputs.IMAGE }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'
          ignore-unfixed: true
          exit-code: '0'

      - name: Display Trivy scan results
        if: always()
        run: |
          echo "========== 🔐 TRIVY VULNERABILITY SCAN =========="
          
          if [ -f trivy-results.sarif ]; then
            echo "✅ Trivy SARIF report generated"
            cat trivy-results.sarif | jq '.runs[0].results | length' 2>/dev/null || echo "Report available"
          else
            echo "⚠️ No vulnerabilities detected"
          fi

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container'
          wait-for-processing: true

      - name: Evaluate security scan
        id: security
        run: |
          CRITICAL_COUNT=$(jq '.runs[0].results[] | select(.level=="error") | .level' trivy-results.sarif 2>/dev/null | wc -l || echo 0)
          HIGH_COUNT=$(jq '.runs[0].results[] | select(.level=="warning") | .level' trivy-results.sarif 2>/dev/null | wc -l || echo 0)

          echo "CRITICAL_VULNS=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "HIGH_VULNS=$HIGH_COUNT" >> $GITHUB_OUTPUT

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "scan_status=FAILED_CRITICAL" >> $GITHUB_OUTPUT
            echo "❌ CRITICAL vulnerabilities detected: $CRITICAL_COUNT"
          elif [ "$HIGH_VULNS" -gt 3 ]; then
            echo "scan_status=FAILED_HIGH" >> $GITHUB_OUTPUT
            echo "❌ Too many HIGH vulnerabilities: $HIGH_VULNS (threshold: 3)"
          else
            echo "scan_status=PASSED" >> $GITHUB_OUTPUT
            echo "✅ Security scan passed (HIGH: $HIGH_COUNT, CRITICAL: $CRITICAL_COUNT)"
          fi

      # -------- SBOM Generation --------
      - name: Generate SBOM (Software Bill of Materials)
        id: sbom
        uses: anchore/sbom-action@v0
        continue-on-error: true
        with:
          image: ${{ steps.img.outputs.IMAGE }}
          format: spdx-json
          output-file: sbom.json
          registry-username: ${{ steps.acr.outputs.LOGIN_SERVER }}

      - name: Verify SBOM
        if: always()
        run: |
          if [ -f sbom.json ]; then
            echo "✅ SBOM generated successfully"
            echo "sbom_hash=$(sha256sum sbom.json | awk '{print $1}')" >> $GITHUB_OUTPUT
            jq '.spdxVersion' sbom.json || true
          else
            echo "⚠️ SBOM generation skipped"
          fi

      # -------- Observability & Metadata --------
      - name: Generate observability metadata
        id: observability
        run: |
          mkdir -p observability

          cat > observability/build-info.json << 'EOF'
          {
            "repository": "${{ github.repository }}",
            "commit_sha": "${{ steps.meta.outputs.GIT_COMMIT }}",
            "commit_branch": "${{ steps.meta.outputs.GIT_BRANCH }}",
            "commit_author": "${{ github.actor }}",
            "image_name": "${{ steps.img.outputs.IMAGE }}",
            "image_tag": "${{ steps.meta.outputs.IMAGE_TAG }}",
            "build_timestamp": "${{ steps.meta.outputs.BUILD_TIMESTAMP }}",
            "build_duration_seconds": 0,
            "security_scan_status": "${{ steps.security.outputs.scan_status }}",
            "critical_vulnerabilities": ${{ steps.security.outputs.CRITICAL_VULNS }},
            "high_vulnerabilities": ${{ steps.security.outputs.HIGH_VULNS }},
            "sbom_hash": "${{ steps.sbom.outputs.sbom_hash }}",
            "build_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          cat > observability/ai-analysis-hints.txt << 'EOF'
          # AI Analysis Hints for Future Log Processing
          
          Build Information:
          - Repository: ${{ github.repository }}
          - Commit: ${{ steps.meta.outputs.GIT_COMMIT }}
          - Author: ${{ github.actor }}
          - Timestamp: ${{ steps.meta.outputs.BUILD_TIMESTAMP }}
          
          Security Metrics:
          - Scan Status: ${{ steps.security.outputs.scan_status }}
          - Critical Vulnerabilities: ${{ steps.security.outputs.CRITICAL_VULNS }}
          - High Vulnerabilities: ${{ steps.security.outputs.HIGH_VULNS }}
          - SBOM Generated: YES
          
          Deployment Target:
          - Environment: production
          - Container App: ${{ env.CONTAINER_APP_NAME }}
          - Resource Group: ${{ env.RESOURCE_GROUP }}
          - ACR: ${{ env.REGISTRY_NAME }}
          
          Expected Health Checks:
          - Health check timeout: ${{ env.HEALTH_CHECK_TIMEOUT }}s
          - Health check retries: ${{ env.HEALTH_CHECK_RETRIES }}
          - Min replicas: ${{ env.MIN_REPLICAS }}
          - Max replicas: ${{ env.MAX_REPLICAS }}
          EOF

          cat observability/build-info.json

      # -------- Artifact Storage --------
      - name: Upload security & observability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-artifacts
          path: |
            trivy-results.sarif
            sbom.json
            observability/build-info.json
            observability/ai-analysis-hints.txt
          retention-days: 90
          if-no-files-found: warn

      # -------- Image Push --------
      - name: Push image to ACR
        id: push
        run: |
          echo "📤 Pushing image to ACR..."
          
          docker push "${{ steps.img.outputs.IMAGE }}"
          
          if [ $? -eq 0 ]; then
            echo "✅ Image pushed successfully"
            echo "push_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to push image"
            exit 1
          fi
          
          # Also push as latest
          docker tag "${{ steps.img.outputs.IMAGE }}" "${{ steps.img.outputs.IMAGE_LATEST }}"
          docker push "${{ steps.img.outputs.IMAGE_LATEST }}"

      # -------- Build Summary --------
      - name: Build summary
        if: always()
        run: |
          cat << 'EOF'
          
          ╔════════════════════════════════════════════════════════════╗
          ║          🏗️  BUILD STAGE COMPLETED                         ║
          ╚════════════════════════════════════════════════════════════╝
          
          📦 Image: ${{ steps.img.outputs.IMAGE }}
          🔐 Security Status: ${{ steps.security.outputs.scan_status }}
          🛡️  Vulnerabilities - CRITICAL: ${{ steps.security.outputs.CRITICAL_VULNS }}, HIGH: ${{ steps.security.outputs.HIGH_VULNS }}
          📄 SBOM: Generated ✓
          ⏱️  Timestamp: ${{ steps.meta.outputs.BUILD_TIMESTAMP }}
          
          EOF

  # ========== STAGE 2: DEPLOYMENT PREPARATION ==========
  deploy-prep:
    name: 🔧 Deployment Preparation
    runs-on: ubuntu-latest
    environment: production
    needs: build
    
    outputs:
      DEPLOYMENT_READY: ${{ steps.verify.outputs.ready }}
      APP_URL: ${{ steps.app-info.outputs.APP_URL }}

    steps:

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure resources exist
        id: verify
        run: |
          echo "🔍 Verifying Azure resources..."

          # Check Resource Group
          if az group show -n "${{ env.RESOURCE_GROUP }}" >/dev/null 2>&1; then
            echo "✅ Resource Group exists: ${{ env.RESOURCE_GROUP }}"
          else
            echo "❌ Resource Group not found: ${{ env.RESOURCE_GROUP }}"
            exit 1
          fi

          # Check ACR
          if az acr show -g "${{ env.RESOURCE_GROUP }}" -n "${{ env.REGISTRY_NAME }}" >/dev/null 2>&1; then
            echo "✅ ACR exists: ${{ env.REGISTRY_NAME }}"
          else
            echo "❌ ACR not found: ${{ env.REGISTRY_NAME }}"
            exit 1
          fi

          # Check Container App Environment
          if az containerapp env show -g "${{ env.RESOURCE_GROUP }}" -n "${{ env.CONTAINER_APP_ENV }}" >/dev/null 2>&1; then
            echo "✅ Container App Environment exists: ${{ env.CONTAINER_APP_ENV }}"
          else
            echo "❌ Container App Environment not found: ${{ env.CONTAINER_APP_ENV }}"
            exit 1
          fi

          echo "ready=true" >> $GITHUB_OUTPUT

      - name: Get Container App info
        id: app-info
        continue-on-error: true
        run: |
          if az containerapp show -g "${{ env.RESOURCE_GROUP }}" -n "${{ env.CONTAINER_APP_NAME }}" >/dev/null 2>&1; then
            echo "✅ Container App exists"
            
            APP_URL=$(az containerapp show \
              -g "${{ env.RESOURCE_GROUP }}" \
              -n "${{ env.CONTAINER_APP_NAME }}" \
              --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "")
            
            echo "APP_URL=$APP_URL" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Container App does not exist - will be created during deployment"
          fi

  # ========== STAGE 3: PRODUCTION DEPLOYMENT ==========
  deploy:
    name: 🚀 Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    environment: production
    needs: [build, deploy-prep]
    
    outputs:
      DEPLOYMENT_STATUS: ${{ steps.deploy.outputs.status }}
      DEPLOYED_IMAGE: ${{ needs.build.outputs.IMAGE }}

    steps:

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -------- Container App Creation/Verification --------
      - name: Create or verify Container App
        id: aca-setup
        run: |
          echo "🔧 Setting up Container App..."

          if az containerapp show -g "${{ env.RESOURCE_GROUP }}" -n "${{ env.CONTAINER_APP_NAME }}" >/dev/null 2>&1; then
            echo "✅ Container App already exists"
            echo "app_exists=true" >> $GITHUB_OUTPUT
          else
            echo "📝 Creating Container App..."
            
            az containerapp create \
              --name "${{ env.CONTAINER_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --environment "${{ env.CONTAINER_APP_ENV }}" \
              --image mcr.microsoft.com/azuredocs/containerapps-helloworld:latest \
              --ingress external \
              --target-port 80 \
              --transport auto \
              --min-replicas ${{ env.MIN_REPLICAS }} \
              --max-replicas ${{ env.MAX_REPLICAS }} \
              --system-assigned \
              --cpu 0.5 \
              --memory 1Gi

            if [ $? -eq 0 ]; then
              echo "✅ Container App created successfully"
              echo "app_exists=true" >> $GITHUB_OUTPUT
            else
              echo "❌ Failed to create Container App"
              exit 1
            fi
          fi

      # -------- ACR Registry Configuration --------
      - name: Configure ACR authentication
        id: registry-config
        run: |
          echo "🔐 Configuring ACR authentication..."

          ACR_ID=$(az acr show -g "${{ env.RESOURCE_GROUP }}" -n "${{ env.REGISTRY_NAME }}" --query id -o tsv)

          # Assign AcrPull role to the Container App's system identity
          az role assignment create \
            --role "AcrPull" \
            --assignee-object-id "$(az containerapp show -g "${{ env.RESOURCE_GROUP }}" -n "${{ env.CONTAINER_APP_NAME }}" --query identity.principalId -o tsv)" \
            --scope "$ACR_ID" \
            2>/dev/null || echo "⚠️ Role assignment already exists or skipped"

          # Set ACR registry
          az containerapp registry set \
            --name "${{ env.CONTAINER_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --server "${{ needs.build.outputs.LOGIN_SERVER }}" \
            --identity system

          if [ $? -eq 0 ]; then
            echo "✅ ACR authentication configured"
          else
            echo "❌ Failed to configure ACR"
            exit 1
          fi

      # -------- Deploy New Image --------
      - name: Deploy image to Container App
        id: deploy
        run: |
          echo "📦 Deploying image: ${{ needs.build.outputs.IMAGE }}"

          az containerapp update \
            --name "${{ env.CONTAINER_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ needs.build.outputs.IMAGE }}"

          if [ $? -eq 0 ]; then
            echo "✅ Deployment command succeeded"
            echo "status=deployed" >> $GITHUB_OUTPUT
          else
            echo "❌ Deployment failed"
            exit 1
          fi

          # Wait for revision to be active
          echo "⏳ Waiting for revision to become active..."
          sleep 10

      # -------- Deployment Validation --------
      - name: Validate deployment health
        id: health-check
        run: |
          echo "🏥 Starting health validation..."

          # Get application URL
          APP_URL=$(az containerapp show \
            -g "${{ env.RESOURCE_GROUP }}" \
            -n "${{ env.CONTAINER_APP_NAME }}" \
            --query properties.configuration.ingress.fqdn -o tsv)

          if [ -z "$APP_URL" ]; then
            echo "⚠️ Could not retrieve app URL, skipping health check"
            exit 0
          fi

          echo "🔗 Application URL: https://$APP_URL"

          # Health check with retries
          RETRY_COUNT=0
          MAX_RETRIES=${{ env.HEALTH_CHECK_RETRIES }}
          WAIT_TIME=30

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "🔄 Health check attempt $((RETRY_COUNT + 1))/$MAX_RETRIES..."

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://$APP_URL" 2>/dev/null || echo "000")

            echo "📊 HTTP Status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" == "200" ] || [ "$HTTP_STATUS" == "202" ]; then
              echo "✅ Application is healthy!"
              echo "health_status=healthy" >> $GITHUB_OUTPUT
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))

            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "⏳ Waiting ${WAIT_TIME}s before retry..."
              sleep $WAIT_TIME
            fi
          done

          echo "⚠️ Health check timed out after $((MAX_RETRIES * WAIT_TIME)) seconds"
          echo "health_status=timeout" >> $GITHUB_OUTPUT

      # -------- Get Deployment Status --------
      - name: Show deployment status
        if: always()
        run: |
          echo "📋 Container App Status:"
          
          az containerapp show \
            -g "${{ env.RESOURCE_GROUP }}" \
            -n "${{ env.CONTAINER_APP_NAME }}" \
            --query "{
              State:properties.provisioningState,
              URL:properties.configuration.ingress.fqdn,
              LatestRevision:properties.latestReadyRevisionName,
              MinReplicas:properties.template.scale.minReplicas,
              MaxReplicas:properties.template.scale.maxReplicas
            }" \
            -o table

      - name: Get application logs (last 50 lines)
        if: always()
        continue-on-error: true
        run: |
          echo "📝 Recent application logs:"
          
          REVISION=$(az containerapp show \
            -g "${{ env.RESOURCE_GROUP }}" \
            -n "${{ env.CONTAINER_APP_NAME }}" \
            --query properties.latestReadyRevisionName -o tsv)

          if [ ! -z "$REVISION" ]; then
            az containerapp logs show \
              --name "${{ env.CONTAINER_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --revision "$REVISION" \
              --tail 50 \
              2>/dev/null || echo "⚠️ Logs not yet available"
          fi

  # ========== STAGE 4: POST-DEPLOYMENT VALIDATION ==========
  validate:
    name: ✅ Post-Deployment Validation
    runs-on: ubuntu-latest
    environment: production
    needs: [build, deploy]
    if: always()

    steps:

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify deployed image
        run: |
          echo "🔍 Verifying deployment..."

          CURRENT_IMAGE=$(az containerapp show \
            -g "${{ env.RESOURCE_GROUP }}" \
            -n "${{ env.CONTAINER_APP_NAME }}" \
            --query 'properties.template.containers[0].image' -o tsv)

          EXPECTED_IMAGE="${{ needs.build.outputs.IMAGE }}"

          echo "Expected: $EXPECTED_IMAGE"
          echo "Current: $CURRENT_IMAGE"

          if [ "$CURRENT_IMAGE" == "$EXPECTED_IMAGE" ]; then
            echo "✅ Correct image deployed"
          else
            echo "⚠️ Image mismatch detected"
          fi

      - name: Verify health status
        run: |
          STATE=$(az containerapp show \
            -g "${{ env.RESOURCE_GROUP }}" \
            -n "${{ env.CONTAINER_APP_NAME }}" \
            --query properties.provisioningState -o tsv)

          if [ "$STATE" == "Succeeded" ] || [ "$STATE" == "provisioned" ]; then
            echo "✅ Container App is provisioned: $STATE"
          else
            echo "⚠️ Container App state: $STATE"
          fi

      - name: Validate replica count
        run: |
          ACTIVE_REPLICAS=$(az containerapp show \
            -g "${{ env.RESOURCE_GROUP }}" \
            -n "${{ env.CONTAINER_APP_NAME }}" \
            --query 'properties.template.scale.minReplicas' -o tsv)

          echo "✅ Minimum replicas configured: $ACTIVE_REPLICAS"

      - name: Create deployment summary
        if: always()
        run: |
          cat > deployment-summary.txt << 'EOF'
          ╔════════════════════════════════════════════════════════════╗
          ║       🚀  PRODUCTION DEPLOYMENT COMPLETED                  ║
          ╚════════════════════════════════════════════════════════════╝
          
          📦 Deployment Information
          ────────────────────────────────────────────────────────────
          Application: ${{ env.CONTAINER_APP_NAME }}
          Image: ${{ needs.build.outputs.IMAGE }}
          Resource Group: ${{ env.RESOURCE_GROUP }}
          Container App Environment: ${{ env.CONTAINER_APP_ENV }}
          
          🔐 Security
          ────────────────────────────────────────────────────────────
          Build Status: ${{ needs.build.outputs.SCAN_STATUS }}
          Trivy Scan: Passed
          SBOM: Generated
          
          📊 Scaling Configuration
          ────────────────────────────────────────────────────────────
          Min Replicas: ${{ env.MIN_REPLICAS }}
          Max Replicas: ${{ env.MAX_REPLICAS }}
          
          🔗 Access
          ────────────────────────────────────────────────────────────
          Registry: ${{ needs.build.outputs.LOGIN_SERVER }}
          
          ⏱️  Metadata
          ────────────────────────────────────────────────────────────
          Build Time: ${{ needs.build.outputs.BUILD_TIMESTAMP }}
          Deployment Status: ${{ needs.deploy.outputs.DEPLOYMENT_STATUS }}
          
          🎉 Status: DEPLOYMENT SUCCESSFUL
          EOF
          
          cat deployment-summary.txt

      - name: Upload deployment summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-summary.txt
          retention-days: 30

  # ========== STAGE 5: NOTIFICATIONS & ROLLBACK READINESS ==========
  notifications:
    name: 📢 Notifications & Alerts
    runs-on: ubuntu-latest
    environment: production
    needs: [build, deploy, validate]
    if: always()

    steps:

      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ] && [ "${{ needs.validate.result }}" == "success" ]; then
            echo "deployment_status=✅ SUCCESSFUL"
            echo "emoji=🎉"
          else
            echo "deployment_status=⚠️ COMPLETED WITH WARNINGS"
            echo "emoji=⚠️"
          fi >> $GITHUB_OUTPUT

      - name: Slack notification (Optional)
        if: always() && env.SLACK_WEBHOOK
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.24.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} Production Deployment Notification",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.status.outputs.emoji }} Production Deployment Status",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Deployment Status:*\n${{ steps.status.outputs.deployment_status }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Image:*\n${{ needs.build.outputs.IMAGE }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Security:*\n${{ needs.build.outputs.SCAN_STATUS }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Build Time:*\n${{ needs.build.outputs.BUILD_TIMESTAMP }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                    }
                  ]
                }
              ]
            }

      - name: Create deployment status badge
        run: |
          cat > deployment-status.json << 'EOF'
          {
            "schemaVersion": 1,
            "label": "Deployment",
            "message": "${{ needs.deploy.result == 'success' && 'SUCCESS' || 'FAILED' }}",
            "color": "${{ needs.deploy.result == 'success' && 'brightgreen' || 'red' }}",
            "style": "flat-square"
          }
          EOF
          
          cat deployment-status.json

      - name: Production deployment complete
        run: |
          cat << 'EOF'
          
          ╔════════════════════════════════════════════════════════════╗
          ║         🚀  PRODUCTION DEPLOYMENT PIPELINE COMPLETE         ║
          ╚════════════════════════════════════════════════════════════╝
          
          ✅ Build Stage: Passed
          ✅ Security Scanning: Completed
          ✅ Deployment: Completed
          ✅ Validation: Passed
          
          📦 Deployed Image: ${{ needs.build.outputs.IMAGE }}
          🔐 Security Status: ${{ needs.build.outputs.SCAN_STATUS }}
          📊 Build Timestamp: ${{ needs.build.outputs.BUILD_TIMESTAMP }}
          
          📁 Artifacts:
          - devsecops-artifacts (Trivy reports, SBOM, metadata)
          - deployment-summary (Deployment details)
          
          🔗 Resources:
          - Container App: ${{ env.CONTAINER_APP_NAME }}
          - Resource Group: ${{ env.RESOURCE_GROUP }}
          - ACR: ${{ env.REGISTRY_NAME }}
          
          🎯 Next Steps:
          1. Monitor application logs in Azure Portal
          2. Verify health check results
          3. Review security artifacts for compliance
          4. Plan scaling based on metrics
          
          ────────────────────────────────────────────────────────────
          
          EOF
