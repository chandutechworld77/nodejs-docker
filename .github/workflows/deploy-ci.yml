name: dev-deploy (ACA)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: aca-master-${{ github.repository }}
  cancel-in-progress: true

env:
  RG_ENV: ${{ vars.RG_ENV }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_REPO: ${{ vars.ACR_REPO }}
  APP_NAME: ${{ vars.APP_NAME }}
  CAE_ENV: ${{ vars.CAE_ENV }}
  INGRESS_TYPE: ${{ vars.INGRESS_TYPE }}
  APP_PORT: ${{ vars.APP_PORT }}

jobs:

# ============================
# BUILD JOB
# ============================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    environment: master

    outputs:
      IMAGE: ${{ steps.set-image.outputs.IMAGE }}
      LOGIN_SERVER: ${{ steps.acr.outputs.LOGIN_SERVER }}

    steps:

    # Debug secrets
    - name: Debug Secrets
      run: |
        echo "CLIENT_ID: ${AZURE_CLIENT_ID:+SET}"
        echo "TENANT_ID: ${AZURE_TENANT_ID:+SET}"
        echo "SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:+SET}"
      env:
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # Clean workspace
    - name: Clean Workspace
      run: |
        rm -rf * .[^.]* || true

    # Checkout
    - name: Checkout Code
      uses: actions/checkout@v4

    # Azure Login (OIDC)
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # Compute image tag
    - name: Compute Image Tag
      id: tag
      run: |
        TAG=${GITHUB_SHA::7}
        echo "TAG=$TAG" >> $GITHUB_ENV

    # Get ACR login server
    - name: Get ACR Login Server
      id: acr
      run: |
        LOGIN_SERVER=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
        echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_ENV
        echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_OUTPUT

    # Define image
    - name: Define Image Name
      id: set-image
      run: |
        IMAGE=$LOGIN_SERVER/$ACR_REPO:$TAG
        echo "IMAGE=$IMAGE" >> $GITHUB_ENV
        echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT

    # Login to ACR
    - name: ACR Login
      run: |
        az acr login --name $ACR_NAME

    # Setup Docker Buildx
    - name: Setup Buildx
      uses: docker/setup-buildx-action@v3

    # Build Docker image
    - name: Build Docker Image
      run: |
        docker buildx build \
          --platform linux/amd64 \
          --load \
          -t $IMAGE .

    # Push Docker image
    - name: Push Docker Image
      run: |
        docker push $IMAGE


# ============================
# DEPLOY JOB
# ============================
  deploy:
    name: Deploy to ACA
    runs-on: ubuntu-latest
    needs: build
    environment: master

    steps:

    # Azure Login
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # Ensure Container App exists
    - name: Ensure Container App
      run: |
        EXISTS=$(az containerapp show \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --query name -o tsv 2>/dev/null || echo "")

        if [ -z "$EXISTS" ]; then
          echo "Creating Container App..."
          az containerapp create \
            --name $APP_NAME \
            --resource-group $RG_ENV \
            --environment $CAE_ENV \
            --image mcr.microsoft.com/azuredocs/containerapps-helloworld:latest \
            --target-port $APP_PORT \
            --ingress $INGRESS_TYPE \
            --min-replicas 1 \
            --max-replicas 2 \
            --registry-server ${{ needs.build.outputs.LOGIN_SERVER }} \
            --system-assigned
        else
          echo "Container App already exists"
        fi

    # Ensure AcrPull role
    - name: Assign AcrPull Role
      run: |
        PRINCIPAL_ID=$(az containerapp show \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --query identity.principalId -o tsv)

        ACR_ID=$(az acr show \
          --name $ACR_NAME \
          --query id -o tsv)

        az role assignment create \
          --assignee $PRINCIPAL_ID \
          --role AcrPull \
          --scope $ACR_ID || echo "Role already assigned"

    # Configure registry
    - name: Configure Registry
      run: |
        az containerapp registry set \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --server ${{ needs.build.outputs.LOGIN_SERVER }} \
          --identity system

    # Deploy new image
    - name: Deploy Image
      run: |
        az containerapp update \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --image ${{ needs.build.outputs.IMAGE }}

    # Show status
    - name: Show Deployment Status
      run: |
        az containerapp show \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --query "{state:properties.provisioningState,fqdn:properties.configuration.ingress.fqdn}" \
          -o table
