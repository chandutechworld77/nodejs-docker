name: Self-Healing CI/CD + Azure Container Apps Deploy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  IMAGE_NAME: app

jobs:

# ---------------- CLEAN WORKSPACE ----------------

  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Clean workspace
        run: |
          echo "Cleaning workspace..."
          sudo rm -rf *
          echo "Workspace cleaned"


# ---------------- CHECKOUT ----------------

  checkout:
    runs-on: ubuntu-latest
    needs: clean
    steps:
      - uses: actions/checkout@v4


# ---------------- LINT ----------------

  lint:
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -type f -name "*.sh" -exec shellcheck {} \; || true


# ---------------- VALIDATE ----------------

  validate-dependencies:
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - uses: actions/checkout@v4

      - name: Validate Dependencies
        run: echo "Validating dependencies..."


# ---------------- RUN SCRIPTS ----------------

  run-scripts:
    runs-on: ubuntu-latest
    needs: [lint, validate-dependencies]

    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Run Scripts with Retry
        run: |
          for script in $(find . -name "*.sh"); do
            echo "Running $script"
            for i in 1 2 3; do
              bash "$script" && break
              echo "Retry $i"
              sleep 5
            done
          done


# ---------------- FLAKY TEST ----------------

  flaky-test-detection:
    runs-on: ubuntu-latest
    needs: run-scripts

    steps:
      - run: echo "Flaky test detection complete"


# ---------------- RECOVERY ----------------

  intelligent-recovery:
    runs-on: ubuntu-latest
    needs: [run-scripts, flaky-test-detection]
    if: always()

    steps:
      - run: echo "Recovery done"


# ---------------- BUILD + PUSH ACR ----------------

  build-push:
    runs-on: ubuntu-latest
    needs: intelligent-recovery

    steps:
      - uses: actions/checkout@v4

      # Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Login to ACR
      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      # Build Docker Image
      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME .

      # Tag Image
      - name: Tag Image
        run: |
          docker tag $IMAGE_NAME:latest \
          ${{ secrets.ACR_NAME }}.azurecr.io/${{ secrets.ACR_REPOSITORY }}:latest

      # Push Image
      - name: Push Image
        run: |
          docker push \
          ${{ secrets.ACR_NAME }}.azurecr.io/${{ secrets.ACR_REPOSITORY }}:latest


# ---------------- DEPLOY TO AZURE CONTAINER APPS ----------------

  deploy-container-app:
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/${{ secrets.ACR_REPOSITORY }}:latest
