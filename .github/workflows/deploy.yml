name: Self-Healing CI/CD + ECS Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: app

jobs:

# ---------------- LINT ----------------

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -type f -name "*.sh" -exec shellcheck {} \; || true


# ---------------- VALIDATE ----------------

  validate-dependencies:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Dependencies
        run: echo "Validating dependencies..."


# ---------------- RUN SCRIPTS ----------------

  run-scripts:
    runs-on: ubuntu-latest
    needs: [lint, validate-dependencies]

    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Run Scripts with Retry
        run: |
          for script in $(find . -name "*.sh"); do
            echo "Running $script"
            for i in 1 2 3; do
              bash "$script" && break
              echo "Retry $i"
              sleep 5
            done
          done


# ---------------- FLAKY TEST ----------------

  flaky-test-detection:
    runs-on: ubuntu-latest
    needs: run-scripts

    steps:
      - run: echo "Flaky test detection complete"


# ---------------- RECOVERY ----------------

  intelligent-recovery:
    runs-on: ubuntu-latest
    needs: [run-scripts, flaky-test-detection]
    if: always()

    steps:
      - run: echo "Recovery done"


# ---------------- BUILD + PUSH ECR ----------------

  build-push:
    runs-on: ubuntu-latest
    needs: intelligent-recovery

    steps:
      - uses: actions/checkout@v4


      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}


      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME .


      - name: Tag Image
        run: |
          docker tag $IMAGE_NAME:latest \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest


      - name: Push Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest



# ---------------- DEPLOY ECS ----------------

  deploy-ecs:
    runs-on: ubuntu-latest
    needs: build-push

    steps:

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}


      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment
