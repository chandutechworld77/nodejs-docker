name: Self-Healing CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # ✅ THIS ENABLES MANUAL RUN BUTTON

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all shell scripts
        run: |
          find . -type f -name "*.sh" -exec shellcheck {} \; || true

  validate-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Dependencies
        run: |
          echo "Validating dependencies..."
          # Add your dependency checks here

  run-scripts:
    runs-on: ubuntu-latest
    needs: [lint, validate-dependencies]
    strategy:
      fail-fast: false
      max-parallel: 4
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Shell Scripts with Auto-Retry
        run: |
          for script in ./**/*.sh; do
            echo "Processing: $script"
            for retry in 1 2 3; do
              bash "$script" && break || echo "Retry $retry for $script"
              sleep 5
            done
          done

  flaky-test-detection:
    runs-on: ubuntu-latest
    needs: run-scripts
    steps:
      - name: Detect Flaky Tests
        run: echo "Flaky test detection complete"

  intelligent-recovery:
    runs-on: ubuntu-latest
    needs: [run-scripts, flaky-test-detection]
    if: always()
    steps:
      - name: Intelligent Failure Recovery
        run: echo "Recovery actions complete"
